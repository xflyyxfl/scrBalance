name: Build and Deploy Debug APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write  # 创建Release需要写权限

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # Release构建已注释 - 未配置签名证书
      # 如需启用：1) 配置签名keystore  2) 取消下方注释  3) 添加Upload Release APK步骤
      # - name: Build Release APK
      #   run: ./gradlew assembleRelease

      - name: Upload Debug APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      # - name: Upload Release APK (Artifact)
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: release-apk
      #     path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release & Upload Debug APK
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.${{ github.run_number }}
          name: Build #${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify WeChat
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          DOWNLOAD_URL="${{ github.server_url }}/${{ github.repository }}/releases/download/v1.${{ github.run_number }}/app-debug.apk"
          curl -G "https://peiyun.cn/msg/wemsg" --data-urlencode "msg=${DOWNLOAD_URL}" --data-urlencode "to=xfl"
